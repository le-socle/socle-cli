# Publish to npm when a version tag is pushed.
#
# Usage:
#   npm version patch    # bumps 0.1.0 → 0.1.1 (or minor/major)
#   git push --tags      # triggers this workflow
#
# The workflow runs the full CI chain first (lint, typecheck, test, build),
# then publishes to npm only if everything passes.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify binary
        run: |
          node dist/cli.js --version
          node dist/cli.js --help

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
