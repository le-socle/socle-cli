# CI pipeline — runs on every push and pull request.
#
# Steps: install deps → lint → typecheck → build → test → verify binary.
# Build runs before test because tests execute the compiled binary.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@lytos.org"
          git config --global user.name "Lytos CI"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify binary works
        run: |
          node dist/cli.js --version
          node dist/cli.js --help
          node dist/cli.js board --help
          node dist/cli.js init --help
